spring:
  application:
    name: avaliafit-api

  datasource:
    url: jdbc:postgresql://localhost:5432/avaliafit
    username: postgres
    password: admin

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000