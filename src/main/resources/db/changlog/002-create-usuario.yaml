databaseChangeLog:
  - changeSet:
      id: 002-create-usuario
      author: eduardo
      changes:
        - createTable:
            tableName: usuario
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true

              - column:
                  name: cliente_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: nome
                  type: VARCHAR(100)
                  constraints:
                    nullable: false

              - column:
                  name: email
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
                    unique: true

              - column:
                  name: telefone
                  type: VARCHAR(15)
                  constraints:
                    nullable: false
                    unique: true

              - column:
                  name: endereco
                  type: VARCHAR(200)

              - column:
                  name: senha
                  type: VARCHAR(200)
                  constraints:
                    nullable: false

              - column:
                  name: role
                  type: VARCHAR(20)
                  defaultValue: 'USER'
                  constraints:
                    nullable: false

              - column:
                  name: bloqueado
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: DATE
                  defaultValueComputed: CURRENT_DATE
                  constraints:
                    nullable: false

              - column:
                  name: updated_at
                  type: DATE

        - addForeignKeyConstraint:
            baseTableName: usuario
            baseColumnNames: cliente_id
            referencedTableName: cliente
            referencedColumnNames: id
            constraintName: fk_usuario_cliente