databaseChangeLog:
  - changeSet:
      id: 004-create-usuario-grupo
      author: eduardo
      changes:
        - createTable:
            tableName: usuario_grupo
            columns:
              - column:
                  name: usuario_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: grupo_id
                  type: BIGINT
                  constraints:
                    nullable: false

        - addPrimaryKey:
            tableName: usuario_grupo
            columnNames: usuario_id, grupo_id
            constraintName: pk_usuario_grupo

        - addForeignKeyConstraint:
            baseTableName: usuario_grupo
            baseColumnNames: usuario_id
            referencedTableName: usuario
            referencedColumnNames: id
            constraintName: fk_usuario_grupo_usuario

        - addForeignKeyConstraint:
            baseTableName: usuario_grupo
            baseColumnNames: grupo_id
            referencedTableName: grupo
            referencedColumnNames: id
            constraintName: fk_usuario_grupo_grupo