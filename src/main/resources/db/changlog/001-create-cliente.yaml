databaseChangeLog:
  - changeSet:
      id: 001-create-cliente
      author: eduardo
      changes:
        - createTable:
            tableName: cliente
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
              - column:
                  name: nome
                  type: VARCHAR(150)
                  constraints:
                    nullable: false
              - column:
                  name: ativo
                  type: BOOLEAN
                  defaultValueBoolean: true